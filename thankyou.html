<!DOCTYPE html>
<html lang="te">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful | Telugu Manifestation Masterclass</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-dark: #05050A;
            --bg-dark-alt: #0A0A10;
            --card-bg: #111116;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --accent-primary: #FFB000;
            --accent-primary-hover: #FF9900;
            --accent-secondary: #FF6600;
            --danger-red: #EF4444;
            --success-green: #25D366;
            /* WhatsApp Green */
            --success-green-hover: #20BA56;
            --font-sans: 'Poppins', sans-serif;
            --font-heading: 'Sora', sans-serif;
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #05050A 0%, #0A0A15 50%, #121225 100%);
            color: var(--text-main);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Ambient Glow Blobs */
        .glow-blob {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 176, 0, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: 1;
            pointer-events: none;
        }

        .glow-blob-1 {
            top: -10%;
            left: -10%;
        }

        .glow-blob-2 {
            bottom: -10%;
            right: -10%;
            background: radial-gradient(circle, rgba(255, 102, 0, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
        }

        .thankyou-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 900px;
        }

        /* Sleek Glassmorphic Main Card */
        .thankyou-card {
            background: rgba(17, 17, 22, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 176, 0, 0.15);
            border-radius: var(--radius-lg);
            padding: 45px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(255, 176, 0, 0.08);
            position: relative;
            overflow: hidden;
        }

        .thankyou-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
        }

        .thankyou-split {
            display: grid;
            grid-template-columns: 1.1fr 1.9fr;
            gap: 40px;
            align-items: center;
        }

        /* Left Column: Coach Portrait with Glow Ring */
        .coach-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .coach-photo-glow {
            position: relative;
            width: 260px;
            height: 310px;
            border-radius: 20px;
            padding: 4px;
            background: linear-gradient(135deg, rgba(255, 176, 0, 0.4) 0%, rgba(255, 102, 0, 0.1) 100%);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 20px rgba(255, 176, 0, 0.15);
            transition: transform 0.4s ease;
        }

        .coach-photo-glow:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.7), 0 0 30px rgba(255, 176, 0, 0.25);
        }

        .coach-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 10%;
            border-radius: 16px;
            filter: brightness(1.2) contrast(1.03);
        }

        /* Right Column: Message & Details */
        .content-column {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .success-badge {
            background: rgba(37, 211, 102, 0.15);
            color: var(--success-green);
            border: 1px solid rgba(37, 211, 102, 0.3);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 16px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .success-badge span {
            width: 6px;
            height: 6px;
            background-color: var(--success-green);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--success-green);
        }

        .congrats-title {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #FFFFFF 0%, #E2E8F0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .congrats-msg {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        /* Schedule Details Grid */
        .schedule-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-md);
            padding: 20px;
            width: 100%;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .schedule-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .schedule-icon-wrap {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: rgba(255, 176, 0, 0.08);
            border: 1px solid rgba(255, 176, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--accent-primary);
        }

        .schedule-icon {
            width: 18px;
            height: 18px;
        }

        .schedule-text {
            display: flex;
            flex-direction: column;
        }

        .schedule-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .schedule-val {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-main);
            margin-top: 1px;
        }

        .schedule-item.full-width {
            grid-column: span 2;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 12px;
            margin-top: 5px;
        }

        /* Massive Pulsating WhatsApp CTA */
        .whatsapp-cta-btn {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: #FFFFFF;
            width: 100%;
            text-decoration: none;
            padding: 16px 28px;
            border-radius: var(--radius-md);
            font-weight: 700;
            font-size: 1.05rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: none;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
            transition: all 0.3s ease;
            position: relative;
            z-index: 10;
        }

        .whatsapp-cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.45);
            filter: brightness(1.08);
        }

        .whatsapp-cta-btn:active {
            transform: translateY(1px);
        }

        .whatsapp-cta-btn .whatsapp-icon {
            width: 24px;
            height: 24px;
            fill: #FFFFFF;
        }

        .whatsapp-cta-btn .sub-cta-label {
            display: block;
            font-size: 0.72rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            margin-top: 1px;
            text-transform: none;
        }

        .whatsapp-btn-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* Pulse Animation */
        .pulse-whatsapp {
            animation: pulseGreen 2s infinite;
        }

        @keyframes pulseGreen {
            0% {
                box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.5);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(37, 211, 102, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(37, 211, 102, 0);
            }
        }

        /* Footer Text */
        .action-notice {
            color: rgba(255, 176, 0, 0.85);
            font-size: 0.78rem;
            font-weight: 600;
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            line-height: 1.4;
        }

        .action-notice svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        /* =======================================================
           MOBILE OPTIMIZATIONS (CTA ALWAYS VISIBLE ABOVE THE FOLD)
           ======================================================= */
        @media (max-width: 768px) {
            body {
                padding: 12px;
                display: flex;
                align-items: flex-start;
                /* Align to top to save vertical height */
                justify-content: center;
                padding-top: 25px;
            }

            .thankyou-card {
                padding: 20px 18px 24px 18px;
                border-radius: var(--radius-md);
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9);
                max-height: calc(100vh - 50px);
                overflow: hidden;
                /* Fits absolutely compact inside viewport */
            }

            /* Compact layout grid: Photo avatar on the left, congrats text on the right */
            .thankyou-split {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .coach-column {
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 10px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.06);
                padding-bottom: 10px;
                margin-bottom: 0px;
                width: 100%;
            }

            .coach-photo-glow {
                width: 70px;
                height: 70px;
                border-radius: 50%;
                padding: 2px;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5), 0 0 10px rgba(255, 176, 0, 0.2);
                background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
                flex-shrink: 0;
            }

            .coach-img {
                border-radius: 50%;
                object-position: center 10%;
            }

            /* Display success details directly next to coach image to save vertical screen space */
            .coach-column-text {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .success-badge {
                margin-bottom: 4px;
                padding: 4px 10px;
                font-size: 0.65rem;
            }

            .congrats-title {
                font-size: 1.3rem;
                margin-bottom: 0;
                text-align: center;
            }

            .content-column {
                width: 100%;
                align-items: center;
            }

            .congrats-msg {
                font-size: 0.78rem;
                line-height: 1.5;
                margin-bottom: 12px;
                text-align: center;
            }

            .schedule-box {
                padding: 10px;
                margin-bottom: 12px;
                gap: 8px;
                grid-template-columns: 1fr 1fr;
            }

            .schedule-item {
                justify-content: center;
            }

            .schedule-icon-wrap {
                width: 28px;
                height: 28px;
                border-radius: 6px;
            }

            .schedule-icon {
                width: 12px;
                height: 12px;
            }

            .schedule-label {
                font-size: 0.58rem;
            }

            .schedule-val {
                font-size: 0.7rem;
            }

            .schedule-item.full-width {
                padding-top: 6px;
                margin-top: 2px;
                justify-content: center;
            }

            /* High-impact mobile CTA button */
            .whatsapp-cta-btn {
                padding: 12px 18px;
                font-size: 0.9rem;
                border-radius: var(--radius-sm);
                justify-content: center;
            }

            .whatsapp-cta-btn .whatsapp-icon {
                width: 18px;
                height: 18px;
            }

            .whatsapp-btn-text {
                align-items: center;
                text-align: center;
            }

            .whatsapp-cta-btn .sub-cta-label {
                font-size: 0.65rem;
            }

            .action-notice {
                font-size: 0.68rem;
                margin-top: 8px;
                justify-content: center;
                text-align: center;
            }
        }

        /* Tiny Screen Adjustment (i.e. iPhone SE) */
        @media (max-width: 360px) {
            .congrats-title {
                font-size: 1.15rem;
            }

            .coach-photo-glow {
                width: 60px;
                height: 60px;
            }

            .schedule-box {
                grid-template-columns: 1fr;
            }

            .schedule-item.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Automated Weekly Wednesday-Thursday Date Rollover
            const updateWorkshopDate = () => {
                // Calculate the upcoming Wednesday in IST (UTC + 5:30)
                let nowUTC = new Date();
                let offsetIST = 5.5 * 60 * 60 * 1000;
                let nowIST = new Date(nowUTC.getTime() + (nowUTC.getTimezoneOffset() * 60 * 1000) + offsetIST);
                
                let dayOfWeek = nowIST.getDay(); // 0 = Sunday, 1 = Monday, 2 = Tuesday, 3 = Wednesday, etc.
                let daysToWednesday = 3 - dayOfWeek;
                
                // Cutoff is Wednesday at 5:00 PM (17:00) IST
                if (daysToWednesday < 0 || (daysToWednesday === 0 && nowIST.getHours() >= 17)) {
                    daysToWednesday += 7;
                }
                
                let wednesdayDate = new Date(nowIST.getTime() + (daysToWednesday * 24 * 60 * 60 * 1000));
                let thursdayDate = new Date(wednesdayDate.getTime() + (1 * 24 * 60 * 60 * 1000));
                
                // Force first workshop to be May 27 & 28, 2026 if calculated date is earlier
                let minStartDate = new Date(Date.UTC(2026, 4, 27, 11, 30)); // May 27, 2026 5:00 PM IST (11:30 AM UTC)
                if (wednesdayDate < minStartDate) {
                    wednesdayDate = new Date(Date.UTC(2026, 4, 27));
                    thursdayDate = new Date(Date.UTC(2026, 4, 28));
                }
                
                const monthNamesShort = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                
                let wedDay = wednesdayDate.getDate();
                let wedMonth = monthNamesShort[wednesdayDate.getMonth()];
                
                let thuDay = thursdayDate.getDate();
                let thuMonth = monthNamesShort[thursdayDate.getMonth()];
                
                // Format for thank you page (excludes days of week)
                let formattedDateTextThankYou = "";
                if (wedMonth === thuMonth) {
                    formattedDateTextThankYou = `${wedDay} & ${thuDay} ${wedMonth}`;
                } else {
                    formattedDateTextThankYou = `${wedDay} ${wedMonth} & ${thuDay} ${thuMonth}`;
                }
                
                // Update thank you page date elements
                const dateElements = document.querySelectorAll('.dynamic-workshop-date');
                dateElements.forEach(el => {
                    el.textContent = formattedDateTextThankYou;
                });
            };
            updateWorkshopDate();
        });
    </script>
